<!DOCTYPE html>
<!--
  ============================================================
  🌟 앱 스타터 — 빈 뼈대(스켈레톤)

  시작하는 법
  1) prd.md 를 내 내용으로 채우기 (기획)
  2) OpenCode 에 이렇게 부탁하기:

  3) 저장(Ctrl+S) → Live Server(또는 브라우저)로 확인 → 하나씩 고쳐 부탁
  ------------------------------------------------------------
-->
