<!DOCTYPE html>
<!--
  ============================================================
  🎮 게임 스타터 — 빈 뼈대(스켈레톤)
  아직 게임이 안 만들어져 있어요. 이제부터 내가 만들 거예요!

  시작하는 법
  1) prd.md 를 내 게임으로 채우기 (최소한만 채워도 OK)
  2) OpenCode 에게 prd.md 검토를 받으며 보강 → 그다음 만들기
       "이 폴더의 prd.md를 참고해서 이 index.html에 웹게임을 만들어줘.
        assets 폴더의 이미지·소리를 쓰고, 초보용 한국어 주석을 달아줘."
  3) 저장(Ctrl+S) → Live Server(또는 브라우저)로 확인 → 하나씩 고쳐 부탁
  ------------------------------------------------------------
-->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='90'%3E🎮%3C/text%3E%3C/svg%3E" />
  <meta name="theme-color" content="#0b1020" />
  <title>내 웹게임</title>

  <!-- (선택) 게임 엔진 Phaser 3 을 쓰고 싶으면 아래 주석을 풀어요 -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script> -->

  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #0b1020;
      display: grid; place-items: center; min-height: 100vh; text-align: center; color: #e7ecf6; }
    .hint { max-width: 560px; padding: 28px; line-height: 1.6; }
    code { background: #1a2238; padding: 2px 7px; border-radius: 6px; font-size: .92em; }
    h1 { color: #a5b4fc; }
    small { opacity: .65 }
  </style>
</head>
<body>

  <!-- 게임 화면(canvas)이 여기에 만들어져요 -->
  <div class="hint">
    <h1>🎮 여기에 내 웹게임이 만들어져요</h1>
    <p>지금은 <b>빈 뼈대</b>예요. 먼저 <b>prd.md</b>를 채운 뒤,<br/>
       OpenCode에게 <code>prd.md를 참고해서 게임을 만들어줘</code> 라고 하세요.</p>
    <p><small>🎨 그림·소리 에셋은 <code>assets/</code> 폴더에 있어요.</small></p>
  </div>

  <script>
    // 여기에 게임 코드를 채워요
  </script>
</body>
</html>
